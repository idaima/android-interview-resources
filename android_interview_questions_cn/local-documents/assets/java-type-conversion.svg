<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" role="img" aria-labelledby="title desc"><title id="title">Java 基本数值类型转换</title><desc id="desc">由窄到宽的自动类型提升，以及向窄类型的显式强制转换。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#334155"/></marker><style>.b{fill:#fef3c7;stroke:#b45309;stroke-width:2}.l{stroke:#334155;stroke-width:2;marker-end:url(#a)}text{font:16px Arial,sans-serif;fill:#78350f}.s{font:13px Arial,sans-serif;fill:#475569}</style></defs><text x="410" y="30" text-anchor="middle">Java 基本数值类型转换</text><text class="s" x="410" y="62" text-anchor="middle">自动提升（widening conversion）</text><g><rect class="b" x="45" y="100" width="105" height="50" rx="6"/><rect class="b" x="185" y="100" width="105" height="50" rx="6"/><rect class="b" x="325" y="100" width="105" height="50" rx="6"/><rect class="b" x="465" y="100" width="105" height="50" rx="6"/><rect class="b" x="605" y="100" width="105" height="50" rx="6"/><text x="98" y="132" text-anchor="middle">byte</text><text x="238" y="132" text-anchor="middle">short</text><text x="378" y="132" text-anchor="middle">int</text><text x="518" y="132" text-anchor="middle">long</text><text x="658" y="132" text-anchor="middle">float</text><rect class="b" x="675" y="195" width="105" height="50" rx="6"/><text x="728" y="227" text-anchor="middle">double</text><line class="l" x1="150" y1="125" x2="185" y2="125"/><line class="l" x1="290" y1="125" x2="325" y2="125"/><line class="l" x1="430" y1="125" x2="465" y2="125"/><line class="l" x1="570" y1="125" x2="605" y2="125"/><line class="l" x1="658" y1="150" x2="710" y2="195"/></g><text class="s" x="410" y="280" text-anchor="middle">向较窄类型转换时需显式强制转换，可能产生精度损失。</text></svg>
