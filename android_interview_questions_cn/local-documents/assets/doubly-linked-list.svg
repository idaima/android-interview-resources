<svg xmlns="http://www.w3.org/2000/svg" width="820" height="210" viewBox="0 0 820 210" role="img" aria-labelledby="title desc"><title id="title">双向链表示意图</title><desc id="desc">结点通过前驱和后继指针双向连接。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#334155"/></marker><style>.n{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.l{stroke:#334155;stroke-width:2;marker-end:url(#a)}text{font:16px Arial,sans-serif;fill:#0f172a}.s{font:13px Arial,sans-serif;fill:#475569}</style></defs><text x="410" y="30" text-anchor="middle">双向链表（Doubly Linked List）</text><rect class="n" x="55" y="78" width="130" height="62" rx="7"/><rect class="n" x="345" y="78" width="130" height="62" rx="7"/><rect class="n" x="635" y="78" width="130" height="62" rx="7"/><text x="120" y="115" text-anchor="middle">节点 A</text><text x="410" y="115" text-anchor="middle">节点 B</text><text x="700" y="115" text-anchor="middle">节点 C</text><line class="l" x1="185" y1="94" x2="345" y2="94"/><line class="l" x1="345" y1="125" x2="185" y2="125"/><line class="l" x1="475" y1="94" x2="635" y2="94"/><line class="l" x1="635" y1="125" x2="475" y2="125"/><text class="s" x="265" y="82" text-anchor="middle">next</text><text class="s" x="265" y="151" text-anchor="middle">prev</text><text class="s" x="555" y="82" text-anchor="middle">next</text><text class="s" x="555" y="151" text-anchor="middle">prev</text></svg>
