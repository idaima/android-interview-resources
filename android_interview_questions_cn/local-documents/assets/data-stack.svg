<svg xmlns="http://www.w3.org/2000/svg" width="500" height="340" viewBox="0 0 500 340" role="img" aria-labelledby="title desc"><title id="title">栈示意图</title><desc id="desc">后进先出数据结构，元素从栈顶压入和弹出。</desc><defs><style>.b{fill:#dcfce7;stroke:#15803d;stroke-width:2}text{font:16px Arial,sans-serif;fill:#14532d}.s{font:14px Arial,sans-serif;fill:#475569}</style></defs><text x="250" y="30" text-anchor="middle">栈（LIFO：后进先出）</text><rect class="b" x="165" y="80" width="170" height="50"/><rect class="b" x="165" y="130" width="170" height="50"/><rect class="b" x="165" y="180" width="170" height="50"/><rect class="b" x="165" y="230" width="170" height="50"/><text x="250" y="112" text-anchor="middle">Top / 元素 4</text><text x="250" y="162" text-anchor="middle">元素 3</text><text x="250" y="212" text-anchor="middle">元素 2</text><text x="250" y="262" text-anchor="middle">Bottom / 元素 1</text><text class="s" x="70" y="110">Push →</text><text class="s" x="350" y="110">← Pop</text></svg>
