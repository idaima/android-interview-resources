<svg xmlns="http://www.w3.org/2000/svg" width="980" height="230" viewBox="0 0 980 230" role="img" aria-labelledby="title desc"><title id="title">Fragment 生命周期概要</title><desc id="desc">Fragment 创建、视图创建、运行、暂停、停止和销毁的典型回调顺序。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#334155"/></marker><style>.b{fill:#f3e8ff;stroke:#7e22ce;stroke-width:2}.l{stroke:#334155;stroke-width:2;marker-end:url(#a)}text{font:14px Arial,sans-serif;fill:#581c87}.s{font:13px Arial,sans-serif;fill:#475569}</style></defs><text x="490" y="30" text-anchor="middle">Fragment 生命周期（概要）</text><g><rect class="b" x="25" y="90" width="115" height="52" rx="6"/><rect class="b" x="175" y="90" width="130" height="52" rx="6"/><rect class="b" x="340" y="90" width="115" height="52" rx="6"/><rect class="b" x="490" y="90" width="115" height="52" rx="6"/><rect class="b" x="640" y="90" width="115" height="52" rx="6"/><rect class="b" x="790" y="90" width="150" height="52" rx="6"/><text x="82" y="121" text-anchor="middle">onCreate</text><text x="240" y="121" text-anchor="middle">onCreateView</text><text x="397" y="121" text-anchor="middle">onStart</text><text x="547" y="121" text-anchor="middle">onResume</text><text x="697" y="121" text-anchor="middle">onPause</text><text x="865" y="121" text-anchor="middle">onStop / onDestroy</text><line class="l" x1="140" y1="116" x2="175" y2="116"/><line class="l" x1="305" y1="116" x2="340" y2="116"/><line class="l" x1="455" y1="116" x2="490" y2="116"/><line class="l" x1="605" y1="116" x2="640" y2="116"/><line class="l" x1="755" y1="116" x2="790" y2="116"/></g><text class="s" x="490" y="185" text-anchor="middle">实际回调会随宿主 Activity、返回栈与视图生命周期而变化。</text></svg>
