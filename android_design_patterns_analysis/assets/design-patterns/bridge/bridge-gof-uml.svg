<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">Bridge pattern UML</title><desc id="desc">Abstraction delegates to Implementor, with independent refined abstractions and concrete implementors.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#334155"/></marker><style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.head{fill:#dbeafe;stroke:#334155;stroke-width:2}.t{font:16px Arial,sans-serif;fill:#0f172a}.s{font:13px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}.dash{stroke-dasharray:7 5}</style></defs>
  <rect class="head" x="80" y="60" width="220" height="45" rx="6"/><rect class="box" x="80" y="105" width="220" height="95" rx="6"/><text class="t" x="190" y="88" text-anchor="middle">Abstraction</text><text class="s" x="100" y="138">- implementor: Implementor</text><text class="s" x="100" y="170">+ operation()</text>
  <rect class="head" x="680" y="60" width="220" height="45" rx="6"/><rect class="box" x="680" y="105" width="220" height="95" rx="6"/><text class="t" x="790" y="88" text-anchor="middle">Implementor</text><text class="s" x="700" y="145">+ implementation()</text>
  <line class="line" x1="300" y1="130" x2="680" y2="130"/><text class="s" x="480" y="120" text-anchor="middle">delegates to</text>
  <rect class="head" x="80" y="300" width="220" height="45" rx="6"/><rect class="box" x="80" y="345" width="220" height="50" rx="6"/><text class="t" x="190" y="328" text-anchor="middle">RefinedAbstraction</text><text class="s" x="100" y="377">+ operation()</text><line class="line dash" x1="190" y1="300" x2="190" y2="200"/><text class="s" x="205" y="255">extends</text>
  <rect class="head" x="540" y="300" width="150" height="45" rx="6"/><rect class="box" x="540" y="345" width="150" height="50" rx="6"/><text class="t" x="615" y="328" text-anchor="middle">Concrete A</text><text class="s" x="558" y="377">implementation()</text><line class="line dash" x1="615" y1="300" x2="735" y2="200"/>
  <rect class="head" x="750" y="300" width="150" height="45" rx="6"/><rect class="box" x="750" y="345" width="150" height="50" rx="6"/><text class="t" x="825" y="328" text-anchor="middle">Concrete B</text><text class="s" x="768" y="377">implementation()</text><line class="line dash" x1="825" y1="300" x2="825" y2="200"/>
</svg>
