<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">Android AdapterView bridge interpretation</title><desc id="desc">An AdapterView hierarchy works independently with an Adapter hierarchy.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#334155"/></marker><style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.head{fill:#dcfce7;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe}.t{font:16px Arial,sans-serif;fill:#0f172a}.s{font:13px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}.dash{stroke-dasharray:7 5}</style></defs>
  <text class="t" x="230" y="35" text-anchor="middle">Abstraction hierarchy</text><text class="t" x="800" y="35" text-anchor="middle">Implementation hierarchy</text>
  <rect class="head" x="110" y="65" width="240" height="45" rx="6"/><rect class="box" x="110" y="110" width="240" height="60" rx="6"/><text class="t" x="230" y="93" text-anchor="middle">AdapterView&lt;T extends Adapter&gt;</text><text class="s" x="130" y="145">+ setAdapter(T)</text>
  <rect class="head" x="110" y="235" width="240" height="45" rx="6"/><rect class="box" x="110" y="280" width="240" height="60" rx="6"/><text class="t" x="230" y="263" text-anchor="middle">AbsListView</text><text class="s" x="130" y="315">mAdapter: ListAdapter</text><line class="line dash" x1="230" y1="235" x2="230" y2="170"/>
  <rect class="head" x="20" y="395" width="160" height="45" rx="6"/><rect class="box" x="20" y="440" width="160" height="38" rx="6"/><text class="t" x="100" y="423" text-anchor="middle">ListView</text><line class="line dash" x1="100" y1="395" x2="190" y2="340"/>
  <rect class="head" x="270" y="395" width="160" height="45" rx="6"/><rect class="box" x="270" y="440" width="160" height="38" rx="6"/><text class="t" x="350" y="423" text-anchor="middle">GridView</text><line class="line dash" x1="350" y1="395" x2="270" y2="340"/>
  <rect class="head blue" x="680" y="65" width="240" height="45" rx="6"/><rect class="box" x="680" y="110" width="240" height="60" rx="6"/><text class="t" x="800" y="93" text-anchor="middle">Adapter</text><text class="s" x="700" y="145">+ getCount() · getView()</text>
  <rect class="head blue" x="680" y="235" width="240" height="45" rx="6"/><rect class="box" x="680" y="280" width="240" height="60" rx="6"/><text class="t" x="800" y="263" text-anchor="middle">ListAdapter</text><text class="s" x="700" y="315">+ isEnabled(position)</text><line class="line dash" x1="800" y1="235" x2="800" y2="170"/>
  <rect class="head blue" x="680" y="395" width="240" height="45" rx="6"/><rect class="box" x="680" y="440" width="240" height="38" rx="6"/><text class="t" x="800" y="423" text-anchor="middle">BaseAdapter / custom adapter</text><line class="line dash" x1="800" y1="395" x2="800" y2="340"/>
  <line class="line" x1="350" y1="305" x2="680" y2="305"/><text class="s" x="515" y="294" text-anchor="middle">uses / holds</text>
</svg>
